<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ticket - Campus Events</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        .print-btn { display: block; margin: 2rem auto; max-width: 200px; }
        .ticket-wrapper { background: white; padding: 20px; border-radius: 1rem; width: fit-content; margin: auto; }
        .ticket { background: #2d3748; border: none; box-shadow: 0 20px 40px rgba(0,0,0,0.4); max-width: 600px; padding: 3rem; position: relative; overflow: hidden; border-radius: 1rem;}
        #qrcode { background: white; padding: 10px; border-radius: 0.5rem; display: inline-block; margin-top: 1.5rem; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a th:href="@{/dashboard}" class="navbar-brand">Campus Events</a>
        <div class="nav-links">
            <a th:href="@{/my-events}" class="btn" style="background-color: var(--surface); color: var(--text); border: 1px solid var(--border); padding: 0.5rem 1rem; width: auto;">Back to My Events</a>
        </div>
    </nav>

    <div class="main-content text-center">
        <!-- Wrapper is for PDF capturing background color cleanly -->
        <div id="ticket-capture" class="ticket-wrapper">
            <div class="ticket" style="text-align: left; margin: 0;">
                <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2rem;">
                    <div>
                        <h1 style="color: var(--primary); margin-bottom: 0.5rem; letter-spacing: 2px; text-transform: uppercase;">VIP Pass</h1>
                        <p class="text-muted" th:text="${'Ticket #TKT-' + registration.id}">#TKT-1234</p>
                    </div>
                    <div id="qrcode"></div>
                </div>

                <div style="background-color: rgba(0,0,0,0.3); padding: 1.5rem; border-radius: 0.5rem; border: 1px solid var(--border); margin-bottom: 2rem;">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem;">
                        <div>
                            <small class="text-muted" style="text-transform: uppercase; font-size: 0.75rem;">Event</small>
                            <h3 th:text="${registration.event.title}" style="margin-top: 0.25rem;">Tech Conference</h3>
                        </div>
                    </div>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem;">
                        <div>
                            <small class="text-muted" style="text-transform: uppercase; font-size: 0.75rem;">Date</small>
                            <p th:text="${registration.event.date}" style="margin-top: 0.25rem; font-weight: bold; font-size: 1.1rem; color: var(--text);">2026-05-12</p>
                        </div>
                        <div>
                            <small class="text-muted" style="text-transform: uppercase; font-size: 0.75rem;">Type</small>
                            <p th:text="${registration.event.type}" style="margin-top: 0.25rem; color: var(--text);">Seminar</p>
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                        <div>
                            <small class="text-muted" style="text-transform: uppercase; font-size: 0.75rem;">Attendee</small>
                            <p th:text="${registration.user.name}" style="margin-top: 0.25rem; color: var(--text);">John Doe</p>
                        </div>
                        <div>
                            <small class="text-muted" style="text-transform: uppercase; font-size: 0.75rem;">Admission Paid</small>
                            <p style="margin-top: 0.25rem; color: var(--text);">
                                <span th:text="${'$' + registration.finalPrice}">$20.00</span>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <button onclick="downloadPDF()" class="btn btn-primary print-btn">Download PDF Ticket</button>
    </div>

    <script th:inline="javascript">
        // Generate QR code dynamically based on Registration Hash
        const regId = /*[[${registration.id}]]*/ '0';
        const userName = /*[[${registration.user.name}]]*/ 'User';
        const eventTitle = /*[[${registration.event.title}]]*/ 'Event';
        const qrData = `TKT-${regId}:${userName}:${eventTitle}`;
        
        new QRCode(document.getElementById("qrcode"), {
            text: qrData,
            width: 80,
            height: 80,
            colorDark : "#0f172a",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.M
        });

        function downloadPDF() {
            const element = document.getElementById('ticket-capture');
            const opt = {
                margin:       0,
                filename:     'event_ticket_TKT-' + regId + '.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2 },
                jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
