<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment Success - Campus Events</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .circle { width: 100px; height: 100px; background-color: #10b981; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 2rem; }
        .checkmark { color: white; font-size: 4rem; margin-top: -10px; }
    </style>
</head>
<body>
    <div class="auth-container" style="text-align: center;">
        <div class="auth-card" style="padding: 4rem 3rem;">
            <div class="circle">
                <span class="checkmark">✓</span>
            </div>
            
            <h2 style="color: var(--primary); margin-bottom: 2rem;" th:text="${successMessage}">Payment Successful</h2>
            
            <p class="text-muted" style="margin-bottom: 2rem; line-height: 1.6;">
                Your payment to Campus Events has been completed. <br>
                Thank you for registering! Your digital ticket has been prepared and your <strong>+10 profile points</strong> have automatically been added. 
            </p>

            <a th:href="@{/ticket/{id}(id=${registration.id})}" class="btn btn-primary" style="display: inline-block; width: auto; padding: 1rem 2rem; margin-bottom: 1rem;">View / Download Ticket</a>
            
            <div>
                <a th:href="@{/dashboard}" style="color: var(--text-muted); text-decoration: underline; font-size: 0.9rem;">Return to Dashboard</a>
            </div>
        </div>
    </div>
</body>
</html>
