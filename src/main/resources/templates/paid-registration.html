<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Paid Registration Form - Campus Events</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <a th:href="@{/dashboard}" class="navbar-brand">Campus Events</a>
        <div class="nav-links">
            <a th:href="@{/events}">Back to Events</a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card" style="max-width: 500px;">
            <h2>Event Registration (Paid)</h2>
            <div style="background-color: var(--surface); border: 1px solid var(--border); padding: 1rem; border-radius: 0.5rem; margin-bottom: 2rem;">
                <h3 th:text="${event.title}" style="color: var(--primary);">Event</h3>
                <p class="text-muted">Total Price: <strong th:text="${'$' + event.price}" style="color: var(--text);"></strong></p>
            </div>

            <form th:action="@{/initiate-payment}" method="post">
                <input type="hidden" name="eventId" th:value="${event.id}">
                
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" class="form-control" th:value="${user.name}" readonly>
                </div>

                <div class="form-group">
                    <label for="mobileNumber">Mobile Number (Required for Ticketing)</label>
                    <input type="text" id="mobileNumber" name="mobileNumber" class="form-control" required minlength="10" maxlength="15" placeholder="e.g. 1234567890">
                </div>
                
                <div class="form-group">
                    <label for="collegeIdNumber">College ID Number</label>
                    <input type="text" id="collegeIdNumber" name="collegeIdNumber" class="form-control" required minlength="4">
                </div>
                
                <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">Proceed to Payment Checkout</button>
            </form>
        </div>
    </div>
</body>
</html>
