<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Browse Events - Campus Events</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <a th:href="@{/dashboard}" class="navbar-brand">Campus Events</a>
        <div class="nav-links">
            <a th:href="@{/dashboard}">Home</a>
            <a th:href="@{/events}" style="color: var(--primary);">Browse Events</a>
            <a th:href="@{/my-events}">My Registrations</a>
            <a th:href="@{/helpdesk}">Help Desk</a>
            <a th:href="@{/logout}">Logout</a>
        </div>
    </nav>

    <div class="main-content">
        <div th:if="${successMessage}" class="flash-message" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="flash-message" style="background-color: rgba(239, 68, 68, 0.1); color: var(--danger); border-color: var(--danger);" th:text="${errorMessage}"></div>

        <div class="page-header" style="flex-direction: column; align-items: flex-start; gap: 1rem;">
            <h2>Browse Upcoming Events</h2>
            
            <form th:action="@{/events}" method="get" style="display: flex; gap: 1rem; width: 100%; max-width: 600px;">
                <input type="text" name="keyword" th:value="${keyword}" class="form-control" placeholder="Search by title, department, or type...">
                <button type="submit" class="btn btn-primary" style="width: auto;">Search</button>
                <a th:href="@{/events}" class="btn" style="width: auto; background-color: var(--surface); color: var(--text); border: 1px solid var(--border);">Clear</a>
            </form>
        </div>

        <div class="grid">
            <div class="card" th:each="event : ${events}">
                <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
                    <span class="badge" th:text="${event.type}">Seminar</span>
                    <span th:if="${event.price == 0.0}" class="badge" style="background-color: transparent; border: 1px solid var(--primary); color: var(--primary);">FREE</span>
                    <span class="text-muted" style="font-size: 0.85rem;" th:text="${event.date}">2026-05-12</span>
                </div>
                <h3 class="card-title" th:text="${event.title}">Tech Conference</h3>
                <p class="card-text" th:text="${event.description}">Description goes here.</p>
                
                <div style="margin-top: 1rem; margin-bottom: 1rem;">
                    <div style="display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 0.25rem;">
                        <span class="text-muted">Seats filled</span>
                        <span th:if="${event.maxCapacity != null}" th:text="${event.currentRegistrations + ' / ' + event.maxCapacity}" class="text-muted"></span>
                    </div>
                    <div th:if="${event.maxCapacity != null}" style="width: 100%; height: 6px; background-color: var(--border); border-radius: 3px; overflow: hidden;">
                        <div style="height: 100%; background-color: var(--primary);" th:styleappend="${'width: ' + ((event.currentRegistrations * 100) / event.maxCapacity) + '%;'}"></div>
                    </div>
                </div>

                <p class="text-muted mb-2"><strong style="color: var(--text);">Dept:</strong> <span th:text="${event.department}"></span></p>
                <p class="text-muted"><strong style="color: var(--text);">Price:</strong> $<span th:text="${event.price}"></span></p>
                
                <hr style="border: none; border-top: 1px solid var(--border); margin: 1.5rem 0;">
                
                <div th:if="${event.maxCapacity != null && event.currentRegistrations >= event.maxCapacity}" style="text-align: center;">
                    <span class="badge" style="background-color: var(--danger); font-size: 1rem; padding: 0.5rem 1rem;">SOLD OUT</span>
                </div>
                
                <form th:if="${event.maxCapacity == null || event.currentRegistrations < event.maxCapacity}" th:action="@{/book}" method="post">
                    <input type="hidden" name="eventId" th:value="${event.id}">
                    <div th:if="${event.price > 0.0}" style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem;">
                        <input type="checkbox" id="coupon_${event.id}" name="applyCoupon" value="true">
                        <label th:for="'coupon_' + ${event.id}" class="text-muted" style="font-size: 0.9rem;">Apply 20% Student Discount</label>
                    </div>
                    <button type="submit" class="btn btn-primary" th:text="${event.price == 0.0 ? 'Join Free Event' : 'Book Now'}">Book Now</button>
                </form>
            </div>
        </div>
        
        <div th:if="${events.empty}" class="text-center" style="margin-top: 3rem;">
            <p class="text-muted">No events currently match your search.</p>
        </div>
    </div>
</body>
</html>
