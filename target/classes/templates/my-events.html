<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Registrations - Campus Events</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <a th:href="@{/dashboard}" class="navbar-brand">Campus Events</a>
        <div class="nav-links">
            <a th:href="@{/dashboard}">Home</a>
            <a th:href="@{/events}">Browse Events</a>
            <a th:href="@{/my-events}" style="color: var(--primary);">My Registrations</a>
            <a th:href="@{/logout}">Logout</a>
        </div>
    </nav>

    <div class="main-content">
        <div class="page-header">
            <h2>My Registered Events</h2>
            <a th:href="@{/events}" class="btn btn-primary" style="width: auto;">Book More Events</a>
        </div>

        <div style="background-color: var(--surface); border: 1px solid var(--border); border-radius: 1rem; overflow: hidden;">
            <table>
                <thead>
                    <tr>
                        <th>Booking ID</th>
                        <th>Event Title</th>
                        <th>Event Date</th>
                        <th>Booked On</th>
                        <th>Paid</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="reg : ${registrations}">
                        <td th:text="${'#TKT-' + reg.id}">#TKT-1</td>
                        <td th:text="${reg.event.title}">Tech Talk</td>
                        <td th:text="${reg.event.date}">2026-10-10</td>
                        <td th:text="${#temporals.format(reg.registrationDate, 'yyyy-MM-dd')}">2026-05-10</td>
                        <td th:text="${'$' + reg.finalPrice}">$20.00</td>
                        <td><span class="badge" style="background-color: rgba(74, 222, 128, 0.2); color: var(--primary); border: 1px solid var(--primary);">Confirmed</span></td>
                        <td>
                            <a th:href="@{/ticket/{id}(id=${reg.id})}" class="btn btn-primary" style="padding: 0.25rem 0.75rem; font-size: 0.85rem; width: auto;">View Ticket</a>
                        </td>
                    </tr>
                    <tr th:if="${registrations.empty}">
                        <td colspan="7" class="text-center text-muted">You haven't registered for any events yet.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
