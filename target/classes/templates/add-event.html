<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Event - Campus Events</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <a th:href="@{/admin/dashboard}" class="navbar-brand">Event Admin</a>
        <div class="nav-links">
            <a th:href="@{/admin/dashboard}">Dashboard</a>
            <a th:href="@{/admin/add-event}">Add Event</a>
            <a th:href="@{/logout}">Logout</a>
        </div>
    </nav>

    <div class="main-content">
        <div class="page-header">
            <h2>Add New Event</h2>
            <a th:href="@{/admin/dashboard}" class="btn btn-primary" style="width: auto; background-color: var(--surface); color: var(--text); border: 1px solid var(--border);">Back</a>
        </div>

        <div class="auth-card" style="max-width: 600px; margin: 0 auto;">
            <form th:action="@{/admin/add-event}" th:object="${event}" method="post">
                <div class="form-group">
                    <label for="title">Event Title</label>
                    <input type="text" id="title" th:field="*{title}" class="form-control" required>
                    <div th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="text-danger"></div>
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" th:field="*{description}" class="form-control" rows="4" required></textarea>
                    <div th:if="${#fields.hasErrors('description')}" th:errors="*{description}" class="text-danger"></div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label for="date">Date</label>
                        <input type="date" id="date" th:field="*{date}" class="form-control" required>
                        <div th:if="${#fields.hasErrors('date')}" th:errors="*{date}" class="text-danger"></div>
                    </div>

                    <div class="form-group">
                        <label for="price">Price ($)</label>
                        <input type="number" step="0.01" id="price" th:field="*{price}" class="form-control" required placeholder="0.00 for Free">
                        <div th:if="${#fields.hasErrors('price')}" th:errors="*{price}" class="text-danger"></div>
                    </div>
                    
                    <div class="form-group">
                        <label for="maxCapacity">Capacity</label>
                        <input type="number" id="maxCapacity" th:field="*{maxCapacity}" class="form-control" required placeholder="e.g. 100">
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label for="department">Department</label>
                        <input type="text" id="department" th:field="*{department}" class="form-control" placeholder="e.g. Computer Science" required>
                    </div>

                    <div class="form-group">
                        <label for="type">Event Type</label>
                        <select id="type" th:field="*{type}" class="form-control" required>
                            <option value="Seminar">Seminar</option>
                            <option value="Workshop">Workshop</option>
                            <option value="Competition">Competition</option>
                            <option value="Cultural">Cultural</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary mt-3">Create Event</button>
            </form>
        </div>
    </div>
</body>
</html>
